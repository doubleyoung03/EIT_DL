# ──────────────────────────────────────────────────────────────────────────────
# EIT Reconstruction – 64x64 High-Resolution Polarised Anomaly Pipeline
# ──────────────────────────────────────────────────────────────────────────────

# ── Network I/O ───────────────────────────────────────────────────────────────
input_dim:   224       # 16 drives x 14 measures  (32 self-measurements excluded)
image_size:  64        # output grid is 64x64 pixels  (4096 output neurons)
tank_radius: 50.0      # circular domain radius [mm]

# ── MLP architecture ──────────────────────────────────────────────────────────
hidden_dims: [512, 1024, 2048]   # encoder widths; head = 2048 -> 4096 + Tanh
dropout:     0.2

# ── Dataset  (CSV produced externally by COMSOL) ──────────────────────────────
data_dir:     data
csv_filename: eit_dataset.csv

# ── Training ──────────────────────────────────────────────────────────────────
lr:                1.0e-3
weight_decay:      1.0e-4
batch_size:        64
epochs:            100
scheduler_patience: 10         # ReduceLROnPlateau: epochs with no val improvement
scheduler_factor:   0.5        # LR multiplier on plateau
patience:          20          # early-stopping patience (epochs)

# ── Output paths ──────────────────────────────────────────────────────────────
checkpoint_dir:  checkpoints
results_dir:     results
